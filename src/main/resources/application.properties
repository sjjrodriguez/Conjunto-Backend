# ===================================================================
# CONFIGURACION DE LA APLICACION
# ===================================================================
spring.application.name=mi-proyecto-api
server.port=8080

# ===================================================================
# CONFIGURACION DE LA BASE DE DATOS (SUPABASE)
# ===================================================================
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.iuevxdziwuluqngcqtqo
spring.datasource.password=sixRTk7aybUVJ?&
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACION DE HIBERNATE / JPA
# ===================================================================
# Dialecto especifico para optimizar las consultas en PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto controla como se crean las tablas basadas en tus entidades de Java:
# - 'update': Crea o modifica las tablas automaticamente si hay cambios (ideal para desarrollo).
# - 'none' o 'validate': No toca la base de datos (obligatorio en produccion).
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de Spring las consultas SQL que se estan ejecutando reales
spring.jpa.show-sql=true
# Formatea el SQL en la consola para que sea facil de leer en lugar de una sola linea larga
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACION DEL POOL DE CONEXIONES (HIKARI)
# ===================================================================
# Configuracion recomendada para evitar caidas de conexion con Supabase Pooler
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
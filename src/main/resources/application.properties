# ===================================================================
# CONFIGURACIÓN DE LA APLICACIÓN
# ===================================================================
spring.application.name=mi-proyecto-api
server.port=8080

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (SUPABASE)
# ===================================================================
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.iuevxdziwuluqngcqtqo
spring.datasource.password=sixRTk7aybUVJ?&
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACIÓN DE HIBERNATE / JPA
# ===================================================================
# Dialecto específico para optimizar las consultas en PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto controla cómo se crean las tablas basadas en tus entidades de Java:
# - 'update': Crea o modifica las tablas automáticamente si hay cambios (ideal para desarrollo).
# - 'none' o 'validate': No toca la base de datos (obligatorio en producción).
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de Spring las consultas SQL que se están ejecutando reales
spring.jpa.show-sql=true
# Formatea el SQL en la consola para que sea fácil de leer en lugar de una sola línea larga
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACIÓN DEL POOL DE CONEXIONES (HIKARI)
# ===================================================================
# Configuración recomendada para evitar caídas de conexión con Supabase Pooler
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000